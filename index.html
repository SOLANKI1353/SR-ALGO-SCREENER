<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SR Algo Screener</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; padding:0; }
    header { background:#222; padding:10px; text-align:center; font-size:20px; font-weight:bold; }
    nav { display:flex; justify-content:center; gap:15px; margin:15px; }
    nav button { padding:10px 15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
    nav button:hover { opacity:0.8; }
    section { padding:20px; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th, td { border:1px solid #444; padding:8px; text-align:center; }
    th { background:#333; }
    .buy { color:lightgreen; font-weight:bold; }
    .sell { color:salmon; font-weight:bold; }
    .hold { color:orange; font-weight:bold; }
  </style>
</head>
<body>
  <header>🚀 SR Algo Screener Dashboard</header>

  <nav>
    <button onclick="loadMarket()">📊 Market</button>
    <button onclick="loadSignals()">🤖 AI Signals</button>
    <button onclick="loadFO()">📑 F&O</button>
    <button onclick="loadSectors()">🌐 Sector Heatmap</button>
  </nav>

  <section id="content">
    <p>Welcome! Use the buttons above to load data.</p>
  </section>

  <script>
    const API_BASE = "https://sralgotradint.gt.tc/api"; // fixed backend

    async function loadMarket(){
      let res = await fetch(`${API_BASE}/market.php`);
      let data = await res.json();
      let html = "<h2>Market Data</h2><table><tr><th>Symbol</th><th>LTP</th><th>Change%</th><th>Sector</th></tr>";
      data.data.forEach(r=>{
        html += `<tr><td>${r.symbol}</td><td>${r.ltp}</td><td>${r.chg}</td><td>${r.sector}</td></tr>`;
      });
      html += "</table>";
      document.getElementById("content").innerHTML = html;
    }

    async function loadSignals(){
      let res = await fetch(`${API_BASE}/market.php`);
      let data = await res.json();
      let res2 = await fetch(`${API_BASE}/signals.php`,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data.data)
      });
      let sigs = await res2.json();
      let html = "<h2>AI Signals</h2><table><tr><th>Symbol</th><th>Signal</th></tr>";
      sigs.signals.forEach(s=>{
        html += `<tr><td>${s.symbol}</td><td class="${s.signal.toLowerCase()}">${s.signal}</td></tr>`;
      });
      html += "</table>";
      document.getElementById("content").innerHTML = html;
    }

    async function loadFO(){
      let res = await fetch(`${API_BASE}/fo.php`);
      let data = await res.json();
      let html = "<h2>F&O Expiries</h2><pre>"+JSON.stringify(data,null,2)+"</pre>";
      document.getElementById("content").innerHTML = html;
    }

    async function loadSectors(){
      let res = await fetch(`${API_BASE}/sectors.php`);
      let data = await res.json();
      let html = "<h2>Sectors</h2><ul>";
      Object.keys(data).forEach(sec=>{
        html += `<li><b>${sec}</b>: ${data[sec].join(", ")}</li>`;
      });
      html += "</ul>";
      document.getElementById("content").innerHTML = html;
    }
  </script>
</body>
</html>
