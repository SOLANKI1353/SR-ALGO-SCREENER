<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SR Algo Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="p-6 max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold mb-4 text-blue-700">SR Algo Screener Dashboard</h1>
    <div class="mb-6">
      <h2 class="text-xl font-bold mb-2">📈 Live Chart</h2>
      <div class="tradingview-widget-container">
        <div id="tradingview_0"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
          new TradingView.widget({
            "width": "100%",
            "height": 500,
            "symbol": "NSE:RELIANCE",
            "interval": "5",
            "timezone": "Asia/Kolkata",
            "theme": "light",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "container_id": "tradingview_0"
          });
        </script>
      </div>
    </div>
    <div class="bg-white p-4 rounded shadow text-green-700">
      <p>✅ Login successful. More features coming in V6 (Live Screener + Option Chain).</p>
    </div>
  </div>
</body>
</html>
